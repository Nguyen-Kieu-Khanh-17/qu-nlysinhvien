# Server Settings
server.port=${PORT:8080}

# Database Connection Settings (Using Environment Variables for Cloud)
# Default to H2 In-Memory if no DB_URL is provided for easy deployment
spring.datasource.url=${DB_URL:jdbc:h2:mem:school;DB_CLOSE_DELAY=-1;MODE=MSSQLServer}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate Settings
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false